<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVA OS | Asset Export</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
        
        body {
            background-color: #080808;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            flex-direction: column;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* The specific area to capture */
        #logo-export-zone {
            padding: 80px 120px;
            background: #080808; /* Solid bg helps the screenshot tool */
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
        }

        .logo-text {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 10rem;
            letter-spacing: -0.05em;
            color: #ffffff;
            user-select: none;
            filter: drop-shadow(0 0 30px rgba(0, 98, 255, 0.4));
        }

        .dot-blue {
            color: #0062ff;
        }

        .controls {
            position: fixed;
            bottom: 40px;
            z-index: 100;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .btn-screenshot {
            background: #ffffff;
            color: #000;
            font-weight: 800;
            padding: 14px 32px;
            border-radius: 8px;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-screenshot:hover {
            background: #0062ff;
            color: white;
            transform: translateY(-2px);
        }

        #status-msg {
            color: #444;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Flash effect when taking photo */
        .flash {
            animation: flash-anim 0.3s ease-out;
        }
        @keyframes flash-anim {
            0% { background: #fff; }
            100% { background: #080808; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="logo-export-zone">
        <div class="logo-text">
            AVA<span class="dot-blue">OS</span>
        </div>
    </div>

    <div class="controls">
        <button class="btn-screenshot" onclick="takeScreenshot()">Capture Logo</button>
        <div id="status-msg">Ready for export</div>
    </div>

    <script>
        // Particle Background
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.4 - 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 80; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        // Screenshot Logic
        function takeScreenshot() {
            const element = document.getElementById('logo-export-zone');
            const status = document.getElementById('status-msg');
            
            status.innerText = "Processing...";
            document.body.classList.add('flash');

            html2canvas(element, {
                backgroundColor: "#080808",
                scale: 3, // Very high quality
                logging: false,
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'AVA-OS-Logo.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
                
                setTimeout(() => {
                    document.body.classList.remove('flash');
                    status.innerText = "Downloaded";
                }, 500);
            }).catch(err => {
                console.error(err);
                status.innerText = "Error - Check Console";
            });
        }

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>
</html>
