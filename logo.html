<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVA OS | Logo Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
        
        body {
            background-color: #080808;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            flex-direction: column;
        }

        /* Particle Canvas for the live view */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* Perfectly centered container */
        .preview-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 1000px;
            height: 500px;
            background: rgba(255,255,255,0.02);
            border: 1px dashed rgba(255,255,255,0.1);
            border-radius: 20px;
        }

        .logo-text {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 10rem;
            letter-spacing: -0.05em;
            color: #ffffff;
            filter: drop-shadow(0 0 30px rgba(0, 98, 255, 0.4));
            user-select: none;
        }

        .dot-blue { color: #0062ff; }

        .btn-capture {
            position: fixed;
            bottom: 40px;
            background: #ffffff;
            color: #000;
            font-weight: 800;
            padding: 16px 40px;
            border-radius: 12px;
            text-transform: uppercase;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn-capture:hover {
            background: #0062ff;
            color: white;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="preview-wrapper">
        <div id="export-target" class="logo-text">
            AVA<span class="dot-blue">OS</span>
        </div>
    </div>

    <button class="btn-capture" onclick="downloadLogo()">Download High-Res PNG</button>

    <script>
        // --- 1. Background Animation ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.4 - 0.2;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 80; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        // --- 2. Reliable Centered Download ---
        function downloadLogo() {
            // Create a temporary canvas for the final export
            const exportCanvas = document.createElement('canvas');
            const eCtx = exportCanvas.getContext('2d');
            
            // Set high resolution (4K-ish aspect)
            exportCanvas.width = 1920;
            exportCanvas.height = 1080;

            // Fill background
            eCtx.fillStyle = "#080808";
            eCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);

            // Draw some "static" particles for the background effect
            eCtx.fillStyle = "rgba(255,255,255,0.15)";
            for(let i=0; i<100; i++) {
                eCtx.beginPath();
                eCtx.arc(Math.random()*1920, Math.random()*1080, Math.random()*3, 0, Math.PI*2);
                eCtx.fill();
            }

            // Draw the Logo Text
            eCtx.textAlign = "center";
            eCtx.textBaseline = "middle";
            eCtx.font = "900 300px Inter, sans-serif";
            
            // Shadow / Glow
            eCtx.shadowColor = "rgba(0, 98, 255, 0.6)";
            eCtx.shadowBlur = 50;

            // Draw "AVA" in White
            const fullText = "AVAOS";
            const xPos = exportCanvas.width / 2;
            const yPos = exportCanvas.height / 2;
            
            eCtx.fillStyle = "#ffffff";
            eCtx.fillText("AVA", xPos - 125, yPos); // Offset slightly for the "OS"

            // Draw "OS" in Blue
            eCtx.fillStyle = "#0062ff";
            eCtx.fillText("OS", xPos + 225, yPos);

            // Trigger download
            const link = document.createElement('a');
            link.download = 'AVA-OS-Branding.png';
            link.href = exportCanvas.toDataURL("image/png");
            link.click();
        }

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>
</html>
