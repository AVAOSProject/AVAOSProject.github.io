<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVA OS | Square Logo Export</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
        
        body {
            background-color: #080808;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            flex-direction: column;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* Square Preview Box */
        .preview-square {
            position: relative;
            width: 500px;
            height: 500px;
            background: #080808;
            border: 2px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .logo-text {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 6rem; /* Scaled down for preview */
            letter-spacing: -0.05em;
            color: #ffffff;
            filter: drop-shadow(0 0 20px rgba(0, 98, 255, 0.3));
        }

        .dot-blue { color: #0062ff; }

        .btn-capture {
            position: fixed;
            bottom: 40px;
            background: #ffffff;
            color: #000;
            font-weight: 800;
            padding: 16px 40px;
            border-radius: 8px;
            text-transform: uppercase;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-capture:hover {
            background: #0062ff;
            color: white;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="preview-square">
        <div class="logo-text">
            AVA<span class="dot-blue">OS</span>
        </div>
    </div>

    <button class="btn-capture" onclick="downloadSquareLogo()">Download 1080x1080 PNG</button>

    <script>
        // --- Background Particles ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = Array.from({length: 60}, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3
            }));
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        // --- Square Logo Export ---
        function downloadSquareLogo() {
            const exp = document.createElement('canvas');
            const eCtx = exp.getContext('2d');
            exp.width = 1080;
            exp.height = 1080;

            // 1. Draw Background
            eCtx.fillStyle = "#080808";
            eCtx.fillRect(0, 0, 1080, 1080);

            // 2. Static Particle Aesthetic
            eCtx.fillStyle = "rgba(255, 255, 255, 0.12)";
            for(let i=0; i<80; i++) {
                eCtx.beginPath();
                eCtx.arc(Math.random()*1080, Math.random()*1080, Math.random()*3, 0, Math.PI*2);
                eCtx.fill();
            }

            // 3. Logo Setup
            const fontSize = 180; // Smaller font size
            eCtx.font = `900 ${fontSize}px Inter, sans-serif`;
            eCtx.textBaseline = "middle";
            
            // Measure widths to prevent overlap
            const widthAVA = eCtx.measureText("AVA").width;
            const widthOS = eCtx.measureText("OS").width;
            const kerning = -8; // Slight negative kerning for that tight look
            const totalWidth = widthAVA + widthOS + kerning;

            // Calculate Start Position (Center Alignment)
            const startX = (1080 - totalWidth) / 2;
            const centerY = 1080 / 2;

            // 4. Draw Shadow/Glow
            eCtx.shadowColor = "rgba(0, 98, 255, 0.5)";
            eCtx.shadowBlur = 40;

            // 5. Draw "AVA"
            eCtx.fillStyle = "#ffffff";
            eCtx.fillText("AVA", startX, centerY);

            // 6. Draw "OS"
            eCtx.shadowBlur = 20; // Lower glow for color clarity
            eCtx.fillStyle = "#0062ff";
            eCtx.fillText("OS", startX + widthAVA + kerning, centerY);

            // 7. Download
            const link = document.createElement('a');
            link.download = 'AVA-OS-Square.png';
            link.href = exp.toDataURL("image/png");
            link.click();
        }

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>
</html>
