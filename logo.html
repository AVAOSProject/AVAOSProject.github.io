<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVAOS | PFP Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap');
        
        :root {
            --blue: #0062ff;
            --bg: #080808;
            --card: rgba(17, 17, 17, 0.85);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--bg);
            color: #eee;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(8,8,8,0.9);
        }

        .logo-text { 
            font-size: 1.4rem; 
            font-weight: 900; 
            letter-spacing: -0.04em; 
            text-decoration: none;
            color: #fff;
        }
        .logo-text span { color: var(--blue); }

        .nav-badge {
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #444;
            border: 1px solid rgba(255,255,255,0.06);
            padding: 4px 10px;
            border-radius: 4px;
        }

        .app-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            flex: 1;
            min-height: calc(100vh - 65px);
        }

        .sidebar {
            border-right: 1px solid var(--border);
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
        }

        .section-label {
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: #444;
            margin-bottom: 12px;
        }

        .control-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-row label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #555;
            display: flex;
            justify-content: space-between;
        }

        .control-row label span { color: #888; }

        input[type=range] {
            width: 100%;
            accent-color: var(--blue);
            cursor: pointer;
            height: 4px;
            border-radius: 10px;
            appearance: none;
            background: #222;
        }

        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--blue);
            cursor: pointer;
        }

        input[type=color] {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: transparent;
        }

        .swatch-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .swatch {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.15s;
        }

        .swatch:hover { transform: scale(1.1); }
        .swatch.active { border-color: #fff; }

        .preset-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .preset-btn {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            color: #999;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .preset-btn:hover { border-color: rgba(0,98,255,0.3); color: #fff; }
        .preset-btn.active {
            border-color: var(--blue);
            background: rgba(0,98,255,0.08);
            color: #fff;
        }

        .btn-export {
            width: 100%;
            background: #fff;
            color: #000;
            font-weight: 900;
            padding: 14px;
            border-radius: 8px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: auto;
        }

        .btn-export:hover { 
            background: var(--blue); 
            color: #fff; 
            transform: translateY(-2px); 
        }

        .preview-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: #050505;
            position: relative;
            overflow: hidden;
        }

        .preview-area::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .canvas-frame {
            position: relative;
            z-index: 1;
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            /* Force 1:1 aspect ratio */
            aspect-ratio: 1 / 1;
            width: min(500px, 60vh, 90vw);
            height: min(500px, 60vh, 90vw);
        }

        #logoCanvas {
            display: block;
            width: 100%;
            height: 100%;
            /* No max-width/height constraints that could cause issues */
        }

        .preview-info {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #333;
            z-index: 2;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .toggle {
            width: 36px;
            height: 20px;
            background: #222;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            transition: background 0.2s;
            border: 1px solid var(--border);
        }

        .toggle.on { background: var(--blue); }
        .toggle::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: left 0.2s;
        }

        .toggle.on::after { left: 18px; }

        .toggle-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #555;
        }

        .size-presets {
            display: flex;
            gap: 8px;
        }

        .size-btn {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px;
            cursor: pointer;
            font-size: 10px;
            color: #666;
            font-weight: 700;
            transition: all 0.2s;
        }

        .size-btn:hover, .size-btn.active {
            border-color: var(--blue);
            color: #fff;
            background: rgba(0,98,255,0.08);
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo-text">AVA<span>OS</span></a>
        <span class="nav-badge">PFP Studio</span>
    </nav>

    <div class="app-layout">

        <div class="sidebar">

            <div>
                <div class="section-label">Export Size</div>
                <div class="size-presets">
                    <button class="size-btn active" onclick="setSize(1024)">1024px</button>
                    <button class="size-btn" onclick="setSize(2048)">2048px</button>
                    <button class="size-btn" onclick="setSize(4096)">4096px</button>
                </div>
            </div>

            <div>
                <div class="section-label">Kerning</div>
                <div class="control-row">
                    <label>Global Gap <span id="gapVal">-35px</span></label>
                    <input type="range" id="gapSlider" min="-80" max="20" value="-35">
                </div>
            </div>

            <div>
                <div class="section-label">Letter Spacing</div>
                <div class="control-row">
                    <label>A-V Tightness <span id="avVal">-35px</span></label>
                    <input type="range" id="avSlider" min="-60" max="10" value="-35">
                </div>
                <div class="control-row" style="margin-top:12px">
                    <label>V-A Tightness <span id="vaVal">-35px</span></label>
                    <input type="range" id="vaSlider" min="-60" max="10" value="-35">
                </div>
                <div class="control-row" style="margin-top:12px">
                    <label>A-O Tightness <span id="aoVal">-12px</span></label>
                    <input type="range" id="aoSlider" min="-40" max="20" value="-12">
                </div>
                <div class="control-row" style="margin-top:12px">
                    <label>O-S Spacing <span id="osVal">+10px</span></label>
                    <input type="range" id="osSlider" min="-20" max="40" value="10">
                </div>
            </div>

            <div>
                <div class="section-label">Colors</div>
                <div class="swatch-row" id="swatchRow">
                    <div class="swatch active" data-color="#0062ff" style="background:#0062ff"></div>
                    <div class="swatch" data-color="#7c3aed" style="background:#7c3aed"></div>
                    <div class="swatch" data-color="#059669" style="background:#059669"></div>
                    <div class="swatch" data-color="#dc2626" style="background:#dc2626"></div>
                    <div class="swatch" data-color="#d97706" style="background:#d97706"></div>
                    <div class="swatch" data-color="#ec4899" style="background:#ec4899"></div>
                    <div class="swatch" data-color="#06b6d4" style="background:#06b6d4"></div>
                    <div class="swatch" data-color="#ffffff" style="background:#fff; border-color: #333"></div>
                </div>
                <div class="control-row" style="margin-top:12px">
                    <input type="color" id="customColor" value="#0062ff">
                </div>
            </div>

            <div>
                <div class="section-label">Style</div>
                <div class="toggle-row">
                    <span class="toggle-label">Dark Background</span>
                    <div class="toggle on" id="toggleDark" onclick="toggleOpt('dark')"></div>
                </div>
                <div class="toggle-row" style="margin-top:12px">
                    <span class="toggle-label">Circle Mask</span>
                    <div class="toggle on" id="toggleCircle" onclick="toggleOpt('circle')"></div>
                </div>
                <div class="toggle-row" style="margin-top:12px">
                    <span class="toggle-label">Glow Effect</span>
                    <div class="toggle on" id="toggleGlow" onclick="toggleOpt('glow')"></div>
                </div>
            </div>

            <div>
                <div class="section-label">Presets</div>
                <div class="preset-grid">
                    <button class="preset-btn active" onclick="loadPreset('default')">Default</button>
                    <button class="preset-btn" onclick="loadPreset('tight')">Ultra Tight</button>
                    <button class="preset-btn" onclick="loadPreset('loose')">Loose</button>
                    <button class="preset-btn" onclick="loadPreset('mono')">Monochrome</button>
                </div>
            </div>

            <button class="btn-export" onclick="downloadLogo()">⬇ Export PNG</button>

        </div>

        <div class="preview-area">
            <div class="canvas-frame">
                <canvas id="logoCanvas"></canvas>
            </div>
            <div class="preview-info" id="previewInfo">1024 × 1024px</div>
        </div>

    </div>

    <script>
        const state = {
            size: 1024,
            gap: -35,
            av: -35,
            va: -35,
            ao: -12,
            os: 10,
            accentColor: '#0062ff',
            dark: true,
            circle: true,
            glow: true
        };

        const canvas = document.getElementById('logoCanvas');
        const ctx = canvas.getContext('2d');

        const presets = {
            default: { gap: -35, av: -35, va: -35, ao: -12, os: 10 },
            tight: { gap: -50, av: -50, va: -50, ao: -25, os: -5 },
            loose: { gap: -10, av: -10, va: -10, ao: 5, os: 25 },
            mono: { gap: -35, av: -35, va: -35, ao: -12, os: 10, accentColor: '#ffffff' }
        };

        function setSize(s) {
            state.size = s;
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            render();
        }

        function toggleOpt(key) {
            state[key] = !state[key];
            document.getElementById('toggle' + key.charAt(0).toUpperCase() + key.slice(1)).classList.toggle('on', state[key]);
            render();
        }

        function loadPreset(name) {
            const p = presets[name];
            state.gap = p.gap;
            state.av = p.av;
            state.va = p.va;
            state.ao = p.ao;
            state.os = p.os;
            if (p.accentColor) state.accentColor = p.accentColor;
            
            document.getElementById('gapSlider').value = p.gap;
            document.getElementById('avSlider').value = p.av;
            document.getElementById('vaSlider').value = p.va;
            document.getElementById('aoSlider').value = p.ao;
            document.getElementById('osSlider').value = p.os;
            
            updateLabels();
            
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            if (p.accentColor) {
                document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
                document.querySelector('.swatch[data-color="#ffffff"]')?.classList.add('active');
            }
            
            render();
        }

        function updateLabels() {
            document.getElementById('gapVal').textContent = (state.gap > 0 ? '+' : '') + state.gap + 'px';
            document.getElementById('avVal').textContent = (state.av > 0 ? '+' : '') + state.av + 'px';
            document.getElementById('vaVal').textContent = (state.va > 0 ? '+' : '') + state.va + 'px';
            document.getElementById('aoVal').textContent = (state.ao > 0 ? '+' : '') + state.ao + 'px';
            document.getElementById('osVal').textContent = (state.os > 0 ? '+' : '') + state.os + 'px';
            document.getElementById('previewInfo').textContent = `${state.size} × ${state.size}px`;
        }

        async function render() {
            await document.fonts.ready;
            
            canvas.width = state.size;
            canvas.height = state.size;

            const center = state.size / 2;
            const fontSize = state.size * 0.22;
            
            // Background
            ctx.fillStyle = state.dark ? "#000000" : "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Circle mask background
            if (state.circle) {
                ctx.save();
                ctx.beginPath();
                ctx.arc(center, center, state.size * 0.48, 0, Math.PI * 2);
                ctx.clip();
                ctx.fillStyle = state.dark ? "#080808" : "#f5f5f5";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // Glow effect
            if (state.glow) {
                const glowSize = state.size * 0.3;
                const grad = ctx.createRadialGradient(center, center, 0, center, center, glowSize);
                const hex = state.accentColor;
                const r = parseInt(hex.slice(1,3),16);
                const g = parseInt(hex.slice(3,5),16);
                const b = parseInt(hex.slice(5,7),16);
                grad.addColorStop(0, `rgba(${r},${g},${b},0.15)`);
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // Text setup
            ctx.font = `900 ${fontSize}px Inter, sans-serif`;
            ctx.textBaseline = "middle";

            const chars = [
                { t: "A", c: state.dark ? "#FFFFFF" : "#000000" },
                { t: "V", c: state.dark ? "#FFFFFF" : "#000000" },
                { t: "A", c: state.dark ? "#FFFFFF" : "#000000" },
                { t: "O", c: state.accentColor },
                { t: "S", c: state.accentColor }
            ];

            const extras = [0, state.av, state.va, state.ao, state.os];

            // Calculate total width
            let totalWidth = 0;
            chars.forEach((char, i) => {
                totalWidth += ctx.measureText(char.t).width;
                if (i < chars.length - 1) totalWidth += state.gap + extras[i];
            });

            let x = (canvas.width - totalWidth) / 2;
            const y = center + fontSize * 0.05;

            chars.forEach((char, i) => {
                ctx.fillStyle = char.c;
                if (i > 0) x += state.gap + extras[i];
                ctx.fillText(char.t, x, y);
                x += ctx.measureText(char.t).width;
            });

            if (state.circle) ctx.restore();

            // Circle border
            if (state.circle) {
                ctx.strokeStyle = state.dark ? "rgba(255,255,255,0.1)" : "rgba(0,0,0,0.1)";
                ctx.lineWidth = state.size * 0.01;
                ctx.beginPath();
                ctx.arc(center, center, state.size * 0.48, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        function downloadLogo() {
            const link = document.createElement('a');
            link.download = `AVAOS_PFP_${state.size}px.png`;
            link.href = canvas.toDataURL("image/png", 1.0);
            link.click();
        }

        // Event listeners
        document.getElementById('gapSlider').addEventListener('input', (e) => {
            state.gap = parseInt(e.target.value);
            updateLabels();
            render();
        });

        document.getElementById('avSlider').addEventListener('input', (e) => {
            state.av = parseInt(e.target.value);
            updateLabels();
            render();
        });

        document.getElementById('vaSlider').addEventListener('input', (e) => {
            state.va = parseInt(e.target.value);
            updateLabels();
            render();
        });

        document.getElementById('aoSlider').addEventListener('input', (e) => {
            state.ao = parseInt(e.target.value);
            updateLabels();
            render();
        });

        document.getElementById('osSlider').addEventListener('input', (e) => {
            state.os = parseInt(e.target.value);
            updateLabels();
            render();
        });

        document.querySelectorAll('.swatch').forEach(s => {
            s.addEventListener('click', () => {
                state.accentColor = s.dataset.color;
                document.getElementById('customColor').value = s.dataset.color;
                document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
                s.classList.add('active');
                render();
            });
        });

        document.getElementById('customColor').addEventListener('input', (e) => {
            state.accentColor = e.target.value;
            document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
            render();
        });

        window.onload = () => {
            render();
        };
    </script>
</body>
</html>
