<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVAOS | Asset Exporter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
        
        body {
            background-color: #080808;
            color: #eee;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .export-card {
            background: rgba(17, 17, 17, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 40px;
            backdrop-filter: blur(20px);
            width: 700px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .canvas-wrapper {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 30px;
            position: relative;
        }

        canvas {
            width: 100%;
            display: block;
        }

        .controls-grid {
            display: grid;
            gap: 20px;
            margin-top: 10px;
        }

        .slider-container {
            text-align: left;
        }

        input[type=range] {
            width: 100%;
            accent-color: #0062ff;
            cursor: pointer;
            background: #222;
            height: 6px;
            border-radius: 10px;
            appearance: none;
        }

        .btn-main {
            background: #ffffff;
            color: #000;
            font-weight: 800;
            padding: 16px;
            border-radius: 8px;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.05em;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }

        .btn-main:hover {
            background: #0062ff;
            color: #fff;
            transform: translateY(-2px);
        }

        .label {
            font-size: 10px;
            text-transform: uppercase;
            color: #555;
            font-weight: 800;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="export-card">
        <div class="mb-8">
            <h1 class="text-2xl font-black tracking-tighter">AVA<span class="text-blue-600">OS</span> <span class="text-gray-600 font-medium text-sm ml-2">ASSET GEN</span></h1>
        </div>

        <div class="canvas-wrapper">
            <canvas id="logoCanvas"></canvas>
        </div>

        <div class="controls-grid">
            <div class="slider-container">
                <label class="label">Global Tightness</label>
                <input type="range" id="gapSlider" min="-60" max="0" value="-35">
            </div>

            <button class="btn-main" onclick="downloadLogo()">Export 2000px PNG</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('logoCanvas');
        const ctx = canvas.getContext('2d');
        const slider = document.getElementById('gapSlider');

        const RES = 2000; // High resolution for the actual export
        canvas.width = RES;
        canvas.height = 2000;

        async function render() {
            await document.fonts.ready;
            const globalGap = parseInt(slider.value);

            // 1. Background
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. Text Setup
            const fontSize = 400;
            ctx.font = `900 ${fontSize}px Inter, sans-serif`;
            ctx.textBaseline = "middle";

            // 3. Character Layout with Website-Spec Kerning
            // The 'AVA' letters get an extra -15px multiplier to close that diagonal gap
            const chars = [
                { t: "A", c: "#FFFFFF", extra:0 },
                { t: "V", c: "#FFFFFF", extra:-35 }, 
                { t: "A", c: "#FFFFFF", extra:-35 }, 
                { t: "O", c: "#0062ff", extra:-12 },
                { t: "S", c: "#0062ff", extra:10 }
            ];

            // Calculate total width
            let totalWidth = 0;
            chars.forEach((char, i) => {
                totalWidth += ctx.measureText(char.t).width;
                if (i < chars.length - 1) totalWidth += globalGap + char.extra;
            });

            // Start drawing from center
            let x = (canvas.width - totalWidth) / 2;
            const y = canvas.height / 2;

            chars.forEach((char, i) => {
                ctx.fillStyle = char.c;
                // Apply the shift before drawing to tuck letters under diagonals
                if (i > 0) x += globalGap + char.extra;
                ctx.fillText(char.t, x, y);
                x += ctx.measureText(char.t).width;
            });
        }

        function downloadLogo() {
            const link = document.createElement('a');
            link.download = 'AVAOS_Branding_Final.png';
            link.href = canvas.toDataURL("image/png", 1.0);
            link.click();
        }

        slider.addEventListener('input', render);
        render(); // Initial load
    </script>
</body>
</html>
