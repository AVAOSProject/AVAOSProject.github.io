<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVAOS | Wallpaper Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap');

        :root {
            --blue: #0062ff;
            --bg: #080808;
            --card: rgba(17,17,17,0.85);
            --border: rgba(255,255,255,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: #eee;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            letter-spacing: -0.02em;
        }

        /* ─── NAV ─── */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(8,8,8,0.9);
        }
        .logo-text { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.04em; }
        .logo-text span { color: var(--blue); }
        .nav-badge {
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #444;
            border: 1px solid rgba(255,255,255,0.06);
            padding: 4px 10px;
            border-radius: 4px;
        }

        /* ─── MAIN LAYOUT ─── */
        .app-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            flex: 1;
            min-height: calc(100vh - 65px);
        }

        /* ─── SIDEBAR ─── */
        .sidebar {
            border-right: 1px solid var(--border);
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            overflow-y: auto;
        }

        .section-label {
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: #444;
            margin-bottom: 12px;
        }

        /* Preset Grid */
        .preset-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .preset-btn {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            color: #999;
        }
        .preset-btn:hover { border-color: rgba(0,98,255,0.3); color: #fff; }
        .preset-btn.active {
            border-color: var(--blue);
            background: rgba(0,98,255,0.08);
            color: #fff;
        }
        .preset-btn .p-name {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            display: block;
        }
        .preset-btn .p-dim {
            font-size: 9px;
            color: #444;
            margin-top: 3px;
            display: block;
        }
        .preset-btn.active .p-dim { color: #5580ff; }

        /* Preset thumbnail mini canvas */
        .preset-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background: #0a0a0a;
            border-radius: 4px;
            margin-bottom: 8px;
            overflow: hidden;
            position: relative;
        }
        .preset-thumb.portrait { aspect-ratio: 9/16; }
        .preset-thumb-canvas { 
            width: 100%; 
            height: 100%; 
            display: block;
            object-fit: contain;
        }

        /* Controls */
        .control-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .control-row label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #555;
            display: flex;
            justify-content: space-between;
        }
        .control-row label span { color: #888; }

        input[type=range] {
            width: 100%;
            accent-color: var(--blue);
            cursor: pointer;
            height: 4px;
            border-radius: 10px;
            appearance: none;
            background: #222;
        }
        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--blue);
            cursor: pointer;
        }

        /* Color swatches */
        .swatch-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .swatch {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.15s;
            position: relative;
        }
        .swatch:hover { transform: scale(1.1); }
        .swatch.active { border-color: #fff; }

        /* Toggle */
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .toggle-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #555;
        }
        .toggle {
            width: 36px;
            height: 20px;
            background: #222;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            transition: background 0.2s;
            border: 1px solid var(--border);
        }
        .toggle.on { background: var(--blue); }
        .toggle::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: left 0.2s;
        }
        .toggle.on::after { left: 18px; }

        /* Export button */
        .btn-export {
            width: 100%;
            background: #fff;
            color: #000;
            font-weight: 900;
            padding: 14px;
            border-radius: 8px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: auto;
        }
        .btn-export:hover { background: var(--blue); color: #fff; transform: translateY(-2px); }

        /* ─── PREVIEW AREA ─── */
        .preview-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: #050505;
            position: relative;
            overflow: hidden;
        }

        .preview-area::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .canvas-frame {
            position: relative;
            z-index: 1;
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
            border-radius: 4px;
            overflow: hidden;
            transition: all 0.3s ease;
            /* Let canvas determine size naturally */
            display: inline-block;
            max-width: min(900px, 90vw);
            max-height: 70vh;
        }

        #wallpaperCanvas {
            display: block;
            /* Remove max-width/max-height here - let parent container handle it */
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 70vh;
        }

        .preview-info {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #333;
            z-index: 2;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-text">AVA<span>OS</span></div>
        <span class="nav-badge">Wallpaper Studio</span>
    </nav>

    <div class="app-layout">

        <!-- ─── SIDEBAR ─── -->
        <div class="sidebar">

            <!-- PRESETS -->
            <div>
                <div class="section-label">Preset</div>
                <div class="preset-grid" id="presetGrid"></div>
            </div>

            <!-- LOGO SIZE -->
            <div>
                <div class="section-label">Logo</div>
                <div class="control-row">
                    <label>Size <span id="sizeVal">100%</span></label>
                    <input type="range" id="logoSize" min="30" max="200" value="100">
                </div>
                <div class="control-row" style="margin-top:14px">
                    <label>Opacity <span id="opacityVal">100%</span></label>
                    <input type="range" id="logoOpacity" min="10" max="100" value="100">
                </div>
            </div>

            <!-- GLOW -->
            <div>
                <div class="section-label">Glow</div>
                <div class="control-row">
                    <label>Intensity <span id="glowVal">50%</span></label>
                    <input type="range" id="glowIntensity" min="0" max="100" value="50">
                </div>
            </div>

            <!-- ACCENT COLOR -->
            <div>
                <div class="section-label">Accent Color</div>
                <div class="swatch-row" id="swatchRow">
                    <div class="swatch active" data-color="#0062ff" style="background:#0062ff"></div>
                    <div class="swatch" data-color="#7c3aed" style="background:#7c3aed"></div>
                    <div class="swatch" data-color="#059669" style="background:#059669"></div>
                    <div class="swatch" data-color="#dc2626" style="background:#dc2626"></div>
                    <div class="swatch" data-color="#d97706" style="background:#d97706"></div>
                    <div class="swatch" data-color="#ec4899" style="background:#ec4899"></div>
                    <div class="swatch" data-color="#ffffff" style="background:#fff; border-color: #333"></div>
                </div>
            </div>

            <!-- TOGGLES -->
            <div style="display:flex;flex-direction:column;gap:12px">
                <div class="section-label" style="margin-bottom:0">Options</div>
                <div class="toggle-row">
                    <span class="toggle-label">Particles</span>
                    <div class="toggle on" id="toggleParticles" onclick="toggleOpt('particles')"></div>
                </div>
                <div class="toggle-row">
                    <span class="toggle-label">Grid Lines</span>
                    <div class="toggle" id="toggleGrid" onclick="toggleOpt('grid')"></div>
                </div>
                <div class="toggle-row">
                    <span class="toggle-label">Tagline</span>
                    <div class="toggle on" id="toggleTagline" onclick="toggleOpt('tagline')"></div>
                </div>
                <div class="toggle-row">
                    <span class="toggle-label">Version Badge</span>
                    <div class="toggle on" id="toggleBadge" onclick="toggleOpt('badge')"></div>
                </div>
            </div>

            <!-- EXPORT -->
            <button class="btn-export" id="exportBtn">⬇ Export PNG</button>

        </div>

        <!-- ─── PREVIEW ─── -->
        <div class="preview-area">
            <div class="canvas-frame" id="canvasFrame">
                <canvas id="wallpaperCanvas"></canvas>
            </div>
            <div class="preview-info" id="previewInfo"></div>
        </div>

    </div>

<script>
    // ─── STATE ───────────────────────────────────────────────────────
    const state = {
        preset: 'normal',
        accentColor: '#0062ff',
        logoSize: 100,
        logoOpacity: 100,
        glowIntensity: 50,
        particles: true,
        grid: false,
        tagline: true,
        badge: true,
    };

    const PRESETS = {
        normal: {
            label: 'Normal',
            w: 1920, h: 1080,
            logoX: 0.5, logoY: 0.5,
            logoFontSize: 220,
            taglineY: 0.62,
            badgeX: 0.5, badgeY: 0.78,
        },
        asymmetrical: {
            label: 'Asymmetric',
            w: 1920, h: 1080,
            logoX: 0.74, logoY: 0.5,
            logoFontSize: 200,
            taglineY: 0.62,
            badgeX: 0.74, badgeY: 0.78,
        },
        cabinet: {
            label: 'Cabinet',
            w: 1920, h: 1080,
            logoX: 0.5, logoY: 0.5,
            logoFontSize: 140,
            mode: 'tile',
            taglineY: 0.52,
            badgeX: 0.5, badgeY: 0.62,
        },
        asymBig: {
            label: 'Asym Big',
            w: 1920, h: 1080,
            logoX: 1.0, logoY: 1.0,
            logoFontSize: 480,
            mode: 'cornerBR',
            taglineY: 0.12,
            badgeX: 0.12, badgeY: 0.22,
        },
        small: {
            label: 'Small',
            w: 1920, h: 1080,
            logoX: 0.5, logoY: 0.5,
            logoFontSize: 110,
            taglineY: 0.58,
            badgeX: 0.5, badgeY: 0.7,
        },
    };

    // ─── PARTICLES ────────────────────────────────────────────────────
    function generateParticles(w, h, count) {
        const pts = [];
        for (let i = 0; i < count; i++) {
            pts.push({ x: Math.random() * w, y: Math.random() * h, r: Math.random() * 1.4 + 0.4 });
        }
        return pts;
    }

    let cachedParticles = null;

    // ─── RENDER ───────────────────────────────────────────────────────
    const canvas = document.getElementById('wallpaperCanvas');
    const ctx = canvas.getContext('2d');

    async function render() {
        await document.fonts.ready;
        const p = PRESETS[state.preset];
        
        // Set internal resolution only - CSS handles display size
        canvas.width = p.w;
        canvas.height = p.h;

        const W = p.w, H = p.h;

        // 1. Background
        ctx.fillStyle = '#080808';
        ctx.fillRect(0, 0, W, H);

        // 2. Optional grid
        if (state.grid) {
            ctx.strokeStyle = 'rgba(255,255,255,0.025)';
            ctx.lineWidth = 1;
            const step = Math.round(W / 40);
            for (let x = 0; x <= W; x += step) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
            for (let y = 0; y <= H; y += step) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
        }

        // 3. Glow
        const gi = state.glowIntensity / 100;
        const hex = state.accentColor;
        const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);

        const glowX = p.mode === 'cornerBR' ? W * 0.85 : p.logoX * W;
        const glowY = p.mode === 'cornerBR' ? H * 0.85 : p.logoY * H;
        const glowR = Math.max(W, H) * 0.55;
        const grad = ctx.createRadialGradient(glowX, glowY, 0, glowX, glowY, glowR);
        grad.addColorStop(0, `rgba(${r},${g},${b},${0.12 * gi})`);
        grad.addColorStop(0.5, `rgba(${r},${g},${b},${0.04 * gi})`);
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        const grad2 = ctx.createRadialGradient(W, H, 0, W, H, W * 0.6);
        grad2.addColorStop(0, `rgba(${r},${g},${b},${0.05 * gi})`);
        grad2.addColorStop(1, 'transparent');
        ctx.fillStyle = grad2;
        ctx.fillRect(0, 0, W, H);

        // 4. Particles
        if (state.particles) {
            const pcount = Math.round((W * H) / 8000);
            if (!cachedParticles || cachedParticles.length !== pcount) {
                cachedParticles = generateParticles(W, H, pcount);
            }
            ctx.fillStyle = 'rgba(255,255,255,0.18)';
            for (const pt of cachedParticles) {
                ctx.beginPath();
                ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 5. Logo
        const scale = state.logoSize / 100;
        const baseFontSize = Math.round(p.logoFontSize * scale);

        function measureLogo(fs) {
            ctx.font = `900 ${fs}px Inter, sans-serif`;
            const gap = -Math.round(fs * 0.09);
            const extras = [0, -Math.round(fs*0.09), -Math.round(fs*0.09), -Math.round(fs*0.03), Math.round(fs*0.025)];
            const letters = ['A','V','A','O','S'];
            let tw = 0;
            letters.forEach((l, i) => {
                tw += ctx.measureText(l).width;
                if (i < letters.length - 1) tw += gap + extras[i];
            });
            return tw;
        }

        function drawLogo(startX, centerY, fs, alpha) {
            ctx.globalAlpha = alpha;
            ctx.font = `900 ${fs}px Inter, sans-serif`;
            ctx.textBaseline = 'middle';
            const gap = -Math.round(fs * 0.09);
            const chars = [
                { t:'A', color:'#FFFFFF', extra:0 },
                { t:'V', color:'#FFFFFF', extra:-Math.round(fs*0.09) },
                { t:'A', color:'#FFFFFF', extra:-Math.round(fs*0.09) },
                { t:'O', color:state.accentColor, extra:-Math.round(fs*0.03) },
                { t:'S', color:state.accentColor, extra:Math.round(fs*0.025) },
            ];
            let lx = startX;
            chars.forEach((c, i) => {
                ctx.fillStyle = c.color;
                if (i > 0) lx += gap + c.extra;
                ctx.fillText(c.t, lx, centerY);
                lx += ctx.measureText(c.t).width;
            });
            ctx.globalAlpha = 1;
        }

        // ── CABINET: tiled repeat ────────────────────────────────────────
        if (p.mode === 'tile') {
            const tileFs = baseFontSize;
            const tileW = measureLogo(tileFs) + Math.round(tileFs * 0.55);
            const tileH = Math.round(tileFs * 1.5);
            const tileAlpha = (state.logoOpacity / 100) * 0.18;

            for (let row = -1; row * tileH < H + tileH; row++) {
                const stagger = (row % 2 === 0) ? 0 : tileW * 0.5;
                for (let col = -1; col * tileW < W + tileW; col++) {
                    const tx = col * tileW + stagger;
                    const ty = row * tileH + tileH / 2;
                    drawLogo(tx, ty, tileFs, tileAlpha);
                }
            }

            ctx.globalAlpha = state.logoOpacity / 100;
            const prominentFs = Math.round(tileFs * 1.6);
            const prominentW = measureLogo(prominentFs);
            drawLogo(W/2 - prominentW/2, H/2, prominentFs, state.logoOpacity / 100);

        // ── CORNER BR: fixed to show full S ─────────────────────────────
        } else if (p.mode === 'cornerBR') {
            const fs = baseFontSize;
            ctx.font = `900 ${fs}px Inter, sans-serif`;
            ctx.textBaseline = 'alphabetic';
            
            const logoW = measureLogo(fs);
            const metrics = ctx.measureText('A');
            const textH = metrics.actualBoundingBoxAscent + metrics.actualBoundingBoxDescent;
            
            const paddingRight = fs * 0.15;
            const paddingBottom = fs * 0.12;
            const startX = W - logoW - paddingRight;
            const baselineY = H - paddingBottom;

            ctx.globalAlpha = state.logoOpacity / 100;
            ctx.font = `900 ${fs}px Inter, sans-serif`;
            ctx.textBaseline = 'alphabetic';
            const gap = -Math.round(fs * 0.09);
            const chars = [
                { t:'A', color:'rgba(255,255,255,0.72)', extra:0 },
                { t:'V', color:'rgba(255,255,255,0.72)', extra:-Math.round(fs*0.09) },
                { t:'A', color:'rgba(255,255,255,0.72)', extra:-Math.round(fs*0.09) },
                { t:'O', color:state.accentColor, extra:-Math.round(fs*0.03) },
                { t:'S', color:state.accentColor, extra:Math.round(fs*0.025) },
            ];
            let lx = startX;
            chars.forEach((c, i) => {
                ctx.fillStyle = c.color;
                if (i > 0) lx += gap + c.extra;
                ctx.fillText(c.t, lx, baselineY);
                lx += ctx.measureText(c.t).width;
            });
            ctx.globalAlpha = 1;
            ctx.textBaseline = 'middle';

        // ── DEFAULT: centered / asymmetric ──────────────────────────────
        } else {
            const logoW = measureLogo(baseFontSize);
            drawLogo(p.logoX * W - logoW / 2, p.logoY * H, baseFontSize, state.logoOpacity / 100);
        }

        ctx.globalAlpha = 1;

        // 6. Tagline
        if (state.tagline && p.mode !== 'tile') {
            const tagSize = Math.round(baseFontSize * 0.072);
            ctx.font = `400 ${tagSize}px Inter, sans-serif`;
            ctx.textBaseline = 'middle';
            ctx.fillStyle = 'rgba(255,255,255,0.25)';
            ctx.textAlign = 'center';
            const tagX = p.mode === 'cornerBR' ? W * 0.12 : p.logoX * W;
            ctx.fillText('PERFORMANCE-CENTRIC OS MODIFICATION', tagX, p.taglineY * H);
        }

        // 7. Version badge
        if (state.badge && p.mode !== 'tile') {
            const badgeX = p.badgeX * W;
            const badgeY = p.badgeY * H;
            const refFs = p.mode === 'cornerBR' ? Math.round(200 * scale) : baseFontSize;
            const bfSize = Math.round(refFs * 0.045);
            ctx.font = `800 ${bfSize}px Inter, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const label = 'PRE-ALPHA';
            const tw = ctx.measureText(label).width;
            const pad = bfSize * 1.2;
            const bw = tw + pad * 2;
            const bh = bfSize * 2.4;

            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            roundRect(ctx, badgeX - bw/2, badgeY - bh/2, bw, bh, bh/2);
            ctx.fill();

            ctx.strokeStyle = `rgba(${r},${g},${b},0.4)`;
            ctx.lineWidth = 1.5;
            roundRect(ctx, badgeX - bw/2, badgeY - bh/2, bw, bh, bh/2);
            ctx.stroke();

            ctx.fillStyle = `rgba(${r},${g},${b},0.9)`;
            ctx.fillText(label, badgeX, badgeY);
        }

        ctx.textAlign = 'left';
        updatePreviewInfo();
    }

    function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    function updatePreviewInfo() {
        const p = PRESETS[state.preset];
        document.getElementById('previewInfo').textContent = `${p.w} × ${p.h}px  //  ${p.label.toUpperCase()}`;
    }

    // ─── PRESET UI ────────────────────────────────────────────────────
    function buildPresetGrid() {
        const grid = document.getElementById('presetGrid');
        grid.innerHTML = '';
        Object.entries(PRESETS).forEach(([key, pr]) => {
            const btn = document.createElement('div');
            btn.className = 'preset-btn' + (key === state.preset ? ' active' : '');
            btn.dataset.key = key;
            const isPortrait = pr.h > pr.w;
            btn.innerHTML = `
                <div class="preset-thumb ${isPortrait ? 'portrait' : ''}">
                    <canvas class="preset-thumb-canvas" data-preset="${key}"></canvas>
                </div>
                <span class="p-name">${pr.label}</span>
                <span class="p-dim">${pr.w}×${pr.h}</span>
            `;
            btn.addEventListener('click', () => {
                state.preset = key;
                cachedParticles = null;
                document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                render();
            });
            grid.appendChild(btn);
        });
        renderThumbs();
    }

    function renderThumbs() {
        document.querySelectorAll('.preset-thumb-canvas').forEach(tc => {
            const key = tc.dataset.preset;
            const p = PRESETS[key];
            const W = p.w, H = p.h;
            
            // Get display size from parent container
            const displayW = tc.parentElement.offsetWidth;
            const displayH = tc.parentElement.offsetHeight;
            
            // Set internal resolution to match display size for thumbnails
            tc.width = displayW;
            tc.height = displayH;
            
            const c = tc.getContext('2d');
            
            // Scale context to match aspect ratio
            const scaleX = displayW / W;
            const scaleY = displayH / H;
            c.scale(scaleX, scaleY);

            c.fillStyle = '#080808';
            c.fillRect(0, 0, W, H);

            const hex = state.accentColor;
            const r2 = parseInt(hex.slice(1,3),16), g2 = parseInt(hex.slice(3,5),16), b2 = parseInt(hex.slice(5,7),16);
            const gx = p.mode === 'cornerBR' ? W*0.85 : p.logoX*W;
            const gy = p.mode === 'cornerBR' ? H*0.85 : p.logoY*H;
            const gr = c.createRadialGradient(gx, gy, 0, gx, gy, W*0.5);
            gr.addColorStop(0, `rgba(${r2},${g2},${b2},0.18)`);
            gr.addColorStop(1, 'transparent');
            c.fillStyle = gr;
            c.fillRect(0, 0, W, H);

            const fs = Math.round(p.logoFontSize * 0.5);
            c.font = `900 ${fs}px Inter, sans-serif`;
            c.textBaseline = 'middle';
            const gap = -Math.round(fs*0.09);
            const ch2 = [
                {t:'A', col:'#fff', ex:0},
                {t:'V', col:'#fff', ex:-Math.round(fs*0.09)},
                {t:'A', col:'#fff', ex:-Math.round(fs*0.09)},
                {t:'O', col:state.accentColor, ex:-Math.round(fs*0.03)},
                {t:'S', col:state.accentColor, ex:Math.round(fs*0.025)},
            ];
            let tw2 = 0;
            ch2.forEach((ch, i) => { tw2 += c.measureText(ch.t).width; if(i<4) tw2 += gap + ch.ex; });

            if (p.mode === 'tile') {
                const tileAlpha = 0.12;
                const tileH2 = Math.round(fs * 1.5);
                for (let row = 0; row < 5; row++) {
                    const stagger = (row%2===0) ? 0 : tw2*0.55;
                    for (let col = -1; col * (tw2*1.5) < W + tw2; col++) {
                        const tx = col*(tw2+Math.round(fs*0.4)) + stagger;
                        const ty = row*tileH2 + tileH2/2;
                        c.globalAlpha = tileAlpha;
                        let lx3 = tx;
                        ch2.forEach((ch, i) => {
                            c.fillStyle = ch.col;
                            if(i>0) lx3 += gap + ch.ex;
                            c.fillText(ch.t, lx3, ty);
                            lx3 += c.measureText(ch.t).width;
                        });
                    }
                }
                c.globalAlpha = 0.85;
                const pFs = Math.round(fs*1.6);
                c.font = `900 ${pFs}px Inter, sans-serif`;
                let tw3=0; ch2.forEach((ch,i)=>{tw3+=c.measureText(ch.t).width;if(i<4)tw3+=(-Math.round(pFs*0.09))+(-Math.round(pFs*0.09));});
                let lxP = W/2 - tw3/2;
                ch2.forEach((ch,i)=>{ c.fillStyle=ch.col; if(i>0)lxP+=(-Math.round(pFs*0.09))+ch.ex; c.fillText(ch.t,lxP,H/2); lxP+=c.measureText(ch.t).width; });
                c.globalAlpha = 1;
            } else if (p.mode === 'cornerBR') {
                c.textBaseline = 'alphabetic';
                const metrics = c.measureText('A');
                const tH = metrics.actualBoundingBoxAscent + metrics.actualBoundingBoxDescent;
                const paddingRight = fs * 0.15;
                const paddingBottom = fs * 0.12;
                const startX = W - tw2 - paddingRight;
                const bY = H - paddingBottom;
                c.globalAlpha = 0.75;
                let lxC = startX;
                ch2.forEach((ch,i)=>{ c.fillStyle=ch.col; if(i>0)lxC+=gap+ch.ex; c.fillText(ch.t,lxC,bY); lxC+=c.measureText(ch.t).width; });
                c.globalAlpha = 1;
                c.textBaseline = 'middle';
            } else {
                c.globalAlpha = 0.9;
                let lx2 = p.logoX * W - tw2/2;
                ch2.forEach((ch, i) => {
                    c.fillStyle = ch.col;
                    if(i>0) lx2 += gap + ch.ex;
                    c.fillText(ch.t, lx2, p.logoY*H);
                    lx2 += c.measureText(ch.t).width;
                });
                c.globalAlpha = 1;
            }
        });
    }

    // ─── CONTROLS ─────────────────────────────────────────────────────
    document.getElementById('logoSize').addEventListener('input', e => {
        state.logoSize = parseInt(e.target.value);
        document.getElementById('sizeVal').textContent = state.logoSize + '%';
        render();
    });

    document.getElementById('logoOpacity').addEventListener('input', e => {
        state.logoOpacity = parseInt(e.target.value);
        document.getElementById('opacityVal').textContent = state.logoOpacity + '%';
        render();
    });

    document.getElementById('glowIntensity').addEventListener('input', e => {
        state.glowIntensity = parseInt(e.target.value);
        document.getElementById('glowVal').textContent = state.glowIntensity + '%';
        render();
    });

    document.querySelectorAll('.swatch').forEach(s => {
        s.addEventListener('click', () => {
            state.accentColor = s.dataset.color;
            document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
            s.classList.add('active');
            cachedParticles = null;
            render();
            renderThumbs();
        });
    });

    function toggleOpt(key) {
        state[key] = !state[key];
        const el = document.getElementById('toggle' + key.charAt(0).toUpperCase() + key.slice(1));
        el.classList.toggle('on', state[key]);
        render();
    }

    document.getElementById('exportBtn').addEventListener('click', () => {
        const p = PRESETS[state.preset];
        const link = document.createElement('a');
        link.download = `AVAOS_Wallpaper_${p.label.replace(/\s+/g,'_')}_${p.w}x${p.h}.png`;
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    });

    // ─── INIT ─────────────────────────────────────────────────────────
    window.onload = async () => {
        await document.fonts.ready;
        buildPresetGrid();
        render();
    };
</script>
</body>
</html>
